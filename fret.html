<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FRET — Focus Strum Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    html, body, #root { height: 100%; }
    body { margin: 0; font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
  </style>
</head>
<body class="bg-zinc-100 text-zinc-900">
  <div id="root"></div>

  <script type="text/babel">
    const { useMemo, useState, useEffect } = React;

    const STORAGE_KEY = 'fret:react-v1';
    const defaultRows = Array.from({ length: 12 }, (_, i) => ({ id: i + 1, text: '', cumulative: 0, session: 0, goalPercent: 0 }));

    const formatTime = (s) => `${String(Math.floor(s / 60)).padStart(2, '0')}:${String(s % 60).padStart(2, '0')}`;

    function Modal({ open, title, onClose, children, footer }) {
      if (!open) return null;
      return (
        <div className="fixed inset-0 z-50 bg-black/50 p-3 sm:p-6 flex items-end sm:items-center justify-center">
          <div className="w-full max-w-3xl max-h-[92vh] bg-white border-2 border-black rounded-2xl shadow-xl flex flex-col overflow-hidden">
            <div className="px-4 py-3 sm:px-6 sm:py-4 border-b border-zinc-200 flex items-center justify-between">
              <h2 className="font-bold text-lg sm:text-2xl">{title}</h2>
              <button onClick={onClose} className="px-3 py-1 rounded-lg border border-zinc-300">✕</button>
            </div>
            <div className="px-4 py-3 sm:px-6 sm:py-5 overflow-y-auto overscroll-contain touch-pan-y">{children}</div>
            {footer && <div className="px-4 py-3 sm:px-6 sm:py-4 border-t border-zinc-200">{footer}</div>}
          </div>
        </div>
      );
    }

    function App() {
      const [rows, setRows] = useState(defaultRows);
      const [label, setLabel] = useState('Strums');
      const [goalOpen, setGoalOpen] = useState(false);
      const [globalOpen, setGlobalOpen] = useState(false);
      const [timerOpen, setTimerOpen] = useState(false);
      const [timerSecs, setTimerSecs] = useState(60);
      const [running, setRunning] = useState(false);
      const [finishedOpen, setFinishedOpen] = useState(false);

      useEffect(() => {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        try {
          const parsed = JSON.parse(raw);
          setRows(parsed.rows || defaultRows);
          setLabel(parsed.label || 'Strums');
          setTimerSecs(parsed.timerSecs || 60);
        } catch {}
      }, []);

      useEffect(() => {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({ rows, label, timerSecs }));
      }, [rows, label, timerSecs]);

      useEffect(() => {
        if (!running) return;
        const id = setInterval(() => {
          setTimerSecs((s) => {
            if (s <= 1) {
              clearInterval(id);
              setRunning(false);
              setFinishedOpen(true);
              return 0;
            }
            return s - 1;
          });
        }, 1000);
        return () => clearInterval(id);
      }, [running]);

      const validRows = useMemo(() => rows.filter((r) => r.text.trim()), [rows]);
      const totalCumulative = useMemo(() => validRows.reduce((a, r) => a + r.cumulative, 0), [validRows]);
      const totalSession = useMemo(() => validRows.reduce((a, r) => a + r.session, 0), [validRows]);
      const goalTotal = useMemo(() => validRows.reduce((a, r) => a + Number(r.goalPercent || 0), 0), [validRows]);

      const setRow = (id, patch) => setRows((p) => p.map((r) => (r.id === id ? { ...r, ...patch } : r)));
      const strum = (id) => setRows((p) => p.map((r) => (r.id === id ? { ...r, cumulative: r.cumulative + 1, session: r.session + 1 } : r)));

      const disparity = validRows.map((r) => {
        const actual = totalCumulative ? (r.cumulative / totalCumulative) * 100 : 0;
        const sessionPct = totalSession ? (r.session / totalSession) * 100 : 0;
        return { ...r, actual, sessionPct, gap: actual - (Number(r.goalPercent) || 0) };
      });

      return (
        <div className="h-full w-full max-w-5xl mx-auto p-2 sm:p-6">
          <div className="h-full bg-white border-2 border-black rounded-2xl shadow-lg overflow-hidden flex flex-col">
            <header className="px-3 py-3 sm:px-5 border-b border-zinc-200 flex flex-wrap gap-2 items-center justify-between">
              <div>
                <h1 className="text-lg sm:text-2xl font-bold">FRET Focus Tracker</h1>
                <p className="text-xs sm:text-sm text-zinc-600">React + Tailwind mobile-first rebuild</p>
              </div>
              <div className="flex flex-wrap gap-2">
                <button onClick={() => setGlobalOpen(true)} className="px-3 py-2 rounded-xl border border-zinc-300 text-sm">Global Stats</button>
                <button onClick={() => setGoalOpen(true)} className="px-3 py-2 rounded-xl border border-zinc-300 text-sm">Goals %</button>
                <button onClick={() => setTimerOpen(true)} className="px-3 py-2 rounded-xl border border-zinc-300 text-sm">Timer</button>
              </div>
            </header>

            <div className="px-3 py-2 sm:px-5 flex items-center gap-2 border-b border-zinc-200">
              <span className="text-sm font-medium">Metric label:</span>
              <input value={label} onChange={(e) => setLabel(e.target.value)} className="border rounded-lg px-2 py-1 text-sm w-40 sm:w-64" />
              <button onClick={() => setRows((p) => p.map((r) => ({ ...r, session: 0 })))} className="ml-auto text-xs sm:text-sm px-2 py-1 border rounded-lg">Reset session</button>
            </div>

            <main className="flex-1 overflow-y-auto p-2 sm:p-4 space-y-2">
              {rows.map((r) => (
                <div key={r.id} className="border border-zinc-200 rounded-xl p-2 sm:p-3 bg-zinc-50">
                  <div className="flex flex-col sm:flex-row sm:items-center gap-2">
                    <input
                      value={r.text}
                      onChange={(e) => setRow(r.id, { text: e.target.value })}
                      placeholder={`Thought ${r.id}`}
                      className="flex-1 border rounded-lg px-3 py-2 text-sm sm:text-base"
                    />
                    <div className="grid grid-cols-3 sm:flex gap-2 items-center">
                      <div className="text-xs sm:text-sm px-2 py-1 border rounded-lg bg-white">C: {r.cumulative}</div>
                      <div className="text-xs sm:text-sm px-2 py-1 border rounded-lg bg-white">S: {r.session}</div>
                      <button onClick={() => strum(r.id)} className="px-3 py-2 rounded-lg bg-black text-white text-xs sm:text-sm">+1 {label}</button>
                    </div>
                  </div>
                </div>
              ))}
            </main>
          </div>

          <Modal
            open={goalOpen}
            onClose={() => setGoalOpen(false)}
            title="Goals % View"
            footer={<div className="text-xs sm:text-sm text-zinc-600">Total goals: <b>{goalTotal.toFixed(1)}%</b> • Remaining impartial: <b>{Math.max(0, 100 - goalTotal).toFixed(1)}%</b></div>}
          >
            <p className="text-sm text-zinc-600 mb-3">Scrollable and mobile-friendly: set goals by row; save is implicit.</p>
            <div className="space-y-2 max-h-[50vh] overflow-y-auto overscroll-contain touch-pan-y pr-1">
              {validRows.length === 0 && <p className="text-sm text-zinc-500 italic">Add row text first.</p>}
              {validRows.map((r) => (
                <div key={r.id} className="border rounded-xl p-3 flex items-center gap-3">
                  <div className="flex-1 min-w-0">
                    <div className="font-medium truncate">{r.text}</div>
                    <div className="text-xs text-zinc-500">Current cumulative: {totalCumulative ? ((r.cumulative / totalCumulative) * 100).toFixed(1) : '0.0'}%</div>
                  </div>
                  <input
                    type="number"
                    min="0"
                    max="100"
                    step="1"
                    value={r.goalPercent}
                    onChange={(e) => setRow(r.id, { goalPercent: Math.max(0, Math.min(100, Number(e.target.value) || 0)) })}
                    className="w-24 border rounded-lg px-2 py-2 text-right"
                  />
                </div>
              ))}
            </div>
            <div className="mt-4 border rounded-xl p-3">
              <h3 className="font-semibold mb-2">Disparity (Cumulative - Goal)</h3>
              <div className="space-y-1 max-h-44 overflow-y-auto overscroll-contain touch-pan-y">
                {disparity.map((d) => (
                  <div key={d.id} className="text-sm">
                    <b>{d.text || `Row ${d.id}`}</b>: Goal {d.goalPercent.toFixed(1)}% • Actual {d.actual.toFixed(1)}% •
                    <span className={d.gap > 0 ? 'text-red-600 font-semibold' : 'text-emerald-700 font-semibold'}> {d.gap > 0 ? '+' : ''}{d.gap.toFixed(1)}%</span>
                  </div>
                ))}
              </div>
            </div>
          </Modal>

          <Modal open={globalOpen} onClose={() => setGlobalOpen(false)} title="Global Cumulative Stats">
            <div className="space-y-2">
              {disparity.length === 0 && <p className="text-sm text-zinc-500 italic">No data yet.</p>}
              {disparity.sort((a, b) => b.cumulative - a.cumulative).map((d) => (
                <div key={d.id} className="border rounded-xl p-3">
                  <div className="font-semibold">{d.text || `Row ${d.id}`}</div>
                  <div className="text-sm text-zinc-600">{label}: {d.cumulative} • Share: {d.actual.toFixed(1)}%</div>
                </div>
              ))}
            </div>
          </Modal>

          <Modal
            open={timerOpen}
            onClose={() => setTimerOpen(false)}
            title="Timer"
            footer={<div className="flex gap-2"><button onClick={() => setRunning((v) => !v)} className="flex-1 bg-black text-white rounded-lg px-3 py-2">{running ? 'Pause' : 'Start'}</button><button onClick={() => setRows((p) => p.map((r) => ({ ...r, session: 0 })))} className="flex-1 border rounded-lg px-3 py-2">Reset Session</button></div>}
          >
            <div className="text-center text-6xl font-mono font-bold">{formatTime(timerSecs)}</div>
            <div className="mt-4 flex gap-2">
              <input type="number" min="1" value={Math.floor(timerSecs / 60)} onChange={(e) => setTimerSecs((Number(e.target.value) || 0) * 60 + (timerSecs % 60))} className="w-full border rounded-lg p-2" />
              <input type="number" min="0" max="59" value={timerSecs % 60} onChange={(e) => setTimerSecs(Math.floor(timerSecs / 60) * 60 + Math.max(0, Math.min(59, Number(e.target.value) || 0)))} className="w-full border rounded-lg p-2" />
            </div>
          </Modal>

          <Modal open={finishedOpen} onClose={() => setFinishedOpen(false)} title="Time's up — Session vs Goal">
            <div className="space-y-2">
              {disparity.map((d) => (
                <div key={d.id} className="border rounded-xl p-3 text-sm">
                  <div className="font-semibold">{d.text || `Row ${d.id}`}</div>
                  <div>Session: {d.sessionPct.toFixed(1)}% • Goal: {d.goalPercent.toFixed(1)}% • Gap: <span className={d.sessionPct - d.goalPercent > 0 ? 'text-red-600 font-semibold' : 'text-emerald-700 font-semibold'}>{(d.sessionPct - d.goalPercent > 0 ? '+' : '') + (d.sessionPct - d.goalPercent).toFixed(1)}%</span></div>
                </div>
              ))}
            </div>
          </Modal>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
