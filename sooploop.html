<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SoopLoop — Transparent Trust Simulator</title>
  <link rel="icon" href="data:," />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fdfbf7;
      --bg-elev: #f9f4ea;
      --panel: #ffffff;
      --panel-soft: #f7f3eb;
      --ink: #111;
      --muted: #5f6673;
      --accent: #cd2b2b;
      --accent-2: #2555ff;
      --warn: #e89b2f;
      --bad: #9d1f3b;
      --border: rgba(17, 17, 17, 0.2);
      --radius: 0px;
      --shadow: 6px 6px 0 rgba(17, 17, 17, 0.9);
    }

    [data-mode="engine"] {
      --accent: #2555ff;
      --accent-2: #cd2b2b;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Space Grotesk", "Segoe UI", system-ui, -apple-system, sans-serif;
      color: var(--ink);
      background:
        linear-gradient(0deg, rgba(205, 43, 43, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(205, 43, 43, 0.06) 1px, transparent 1px),
        var(--bg);
      background-size: 26px 26px;
      min-height: 100vh;
      letter-spacing: 0.01em;
    }

    h1, h2, h3, h4, strong, b { font-weight: 700; }

    .app { display: grid; grid-template-rows: auto auto 1fr; min-height: 100vh; }
    .mode-banner {
      position: sticky;
      top: 0;
      z-index: 30;
      display: flex;
      gap: 16px;
      align-items: center;
      justify-content: space-between;
      padding: 12px 18px;
      border-bottom: 1px solid var(--border);
      background: rgba(253, 251, 247, 0.95);
      backdrop-filter: blur(4px);
    }

    .toggle {
      display: flex;
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 0;
      padding: 4px;
    }

    .toggle button {
      border: 1px solid transparent;
      color: var(--ink);
      background: transparent;
      border-radius: 0;
      padding: 8px 16px;
      cursor: pointer;
      font-weight: 700;
      font-family: "Space Mono", monospace;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .toggle .active {
      background: var(--accent);
      color: #fff;
      box-shadow: inset 0 0 0 1px rgba(17, 17, 17, 0.2);
    }

    .main-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      background: rgba(249, 244, 234, 0.94);
    }

    .main-nav button, .btn {
      background: #fff;
      border: 1px solid var(--border);
      color: var(--ink);
      border-radius: 0;
      padding: 8px 12px;
      cursor: pointer;
      font-weight: 700;
      font-family: "Space Mono", monospace;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-size: 11px;
    }

    .main-nav .active {
      background: var(--ink);
      color: #fff;
      outline: 0;
    }

    .btn.good { background: var(--accent-2); color: #fff; }
    .btn.warn { background: var(--warn); color: #111; }
    .btn.bad { background: var(--bad); color: #fff; }

    .shell {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      padding: 12px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      transition: transform 180ms ease, box-shadow 180ms ease;
    }
    .panel:hover { transform: translateY(-2px); box-shadow: 8px 8px 0 rgba(17, 17, 17, 0.92); }

    .left, .right { padding: 14px; display: flex; flex-direction: column; gap: 12px; }
    .content { padding: 14px; min-height: 70vh; }

    .balance-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .pill { background: var(--panel-soft); border: 1px solid var(--border); border-radius: 0; padding: 9px; }
    .pill b { display: block; font-size: 21px; }

    .muted { color: var(--muted); font-size: 12px; font-family: "Space Mono", monospace; }
    .feed-card {
      border: 1px solid var(--border);
      background: var(--panel-soft);
      border-radius: 0;
      padding: 12px;
      margin-bottom: 10px;
      animation: fadeIn 320ms ease;
    }

    .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .chip { border: 1px solid var(--border); border-radius: 0; padding: 2px 9px; font-size: 11px; background: #fff; font-family: "Space Mono", monospace; }

    .split { display: grid; grid-template-columns: 1.2fr .8fr; gap: 12px; }
    .composer textarea, .comment-input {
      width: 100%;
      min-height: 90px;
      border-radius: 0;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--ink);
      padding: 10px;
      font-family: inherit;
    }

    .comment-input { min-height: 44px; }
    .comment-list { margin-top: 8px; display: grid; gap: 6px; }
    .comment-item { background: #fff; border: 1px solid var(--border); border-radius: 0; padding: 8px; }
    .comment-actions { display: flex; gap: 6px; margin-top: 6px; }
    .mini-btn { border: 1px solid var(--border); border-radius: 0; background: #fff; color: var(--ink); font-size: 11px; padding: 4px 8px; cursor: pointer; font-family: "Space Mono", monospace; text-transform: uppercase; }

    .meter { height: 10px; border: 1px solid var(--border); border-radius: 0; background: #fff; overflow: hidden; }
    .meter > div { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); }

    .map { min-height: 420px; background: radial-gradient(circle, rgba(205, 43, 43, .08), transparent 60%), #f9f4ea; border-radius: 0; border: 1px solid var(--border); position: relative; overflow: hidden; }
    .node {
      position: absolute;
      border-radius: 50%;
      border: 2px solid rgba(17, 17, 17, .8);
      display: grid;
      place-items: center;
      color: #111;
      font-size: 9px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 220ms ease;
    }
    .node:hover { transform: scale(1.08); }

    .node-label { max-width: 85%; text-align: center; line-height: 1; }

    .tooltip {
      position: fixed;
      pointer-events: none;
      z-index: 120;
      background: rgba(255, 255, 255, 0.98);
      border: 1px solid var(--border);
      border-radius: 0;
      padding: 8px 10px;
      max-width: 250px;
      color: var(--ink);
      font-size: 12px;
      box-shadow: 4px 4px 0 rgba(17, 17, 17, 0.9);
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 120ms ease, transform 120ms ease;
    }
    .tooltip.show { opacity: 1; transform: translateY(0); }

    .toast {
      position: fixed;
      right: 14px;
      bottom: 14px;
      z-index: 90;
      background: #fff;
      border: 1px solid var(--border);
      color: var(--ink);
      padding: 10px 12px;
      border-radius: 0;
      max-width: 340px;
    }

    .sim-controls input[type="range"], .sim-controls select { width: 100%; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (min-width: 980px) {
      .shell { grid-template-columns: 240px 1fr 320px; }
    }

    @media (max-width: 1150px) {
      .split { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body data-mode="user">
  <div class="app">
    <header class="mode-banner">
      <div>
        <strong id="mode-title">User View</strong>
        <div class="muted" id="mode-subtitle">See the platform the way participants do.</div>
      </div>
      <div class="toggle" role="tablist" aria-label="Mode toggle">
        <button id="userModeBtn" class="active" data-tip="Experience SoopLoop as a participant.">User View</button>
        <button id="engineModeBtn" data-tip="Inspect transparent ranking internals.">Engine View</button>
      </div>
      <div class="row">
        <button class="btn" id="resetSimBtn" data-tip="Rewind to your seeded starting state.">Reset Simulation</button>
        <label class="muted">Seed <input id="seedInput" type="number" value="42" min="1" style="width:76px" /></label>
      </div>
    </header>

    <nav class="main-nav" id="mainNav"></nav>

    <div class="shell">
      <aside class="panel left">
        <h3 style="margin:0">Trust / Balances</h3>
        <div class="balance-row" id="balances"></div>
        <div class="panel" style="padding:10px;background:var(--panel-soft)">
          <strong>Glossary</strong>
          <ul class="muted">
            <li><b>VC:</b> Voice credits spent to post/comment.</li>
            <li><b>TR:</b> Trust earned from quality activity.</li>
            <li><b>BT:</b> Boost credits for amplification.</li>
            <li><b>XP:</b> Profile points from participation.</li>
          </ul>
        </div>
      </aside>

      <main class="panel content" id="viewRoot"></main>

      <aside class="panel right">
        <h3 style="margin:0">Engine Diagnostics</h3>
        <div id="diagnostics" class="muted"></div>
        <div class="panel" style="padding:10px;background:var(--panel-soft)">
          <strong>Simulation Control Bar</strong>
          <div class="sim-controls">
            <label class="muted" data-tip="Swap stress conditions for the ranking model.">Scenario <select id="scenarioSelect"></select></label>
            <div class="row" style="margin-top:8px">
            <button class="btn" id="playPauseBtn" data-tip="Run the simulation continuously.">Play</button>
              <button class="btn" id="stepBtn" data-tip="Advance exactly one simulation tick.">Step +1 tick</button>
            </div>
            <label class="muted" data-tip="How many ticks run per second.">Speed <input type="range" id="speedRange" min="1" max="4" value="1"/></label>
            <label class="muted" data-tip="Higher noise increases volatility and content churn.">Noise level <input type="range" id="noiseRange" min="0" max="100" value="40"/></label>
            <label class="muted">Overlap density <input type="range" id="overlapRange" min="10" max="100" value="54"/></label>
            <label class="muted">Trust decay <input type="range" id="decayRange" min="0" max="40" value="8"/></label>
            <label class="muted">Self-boost cap % <input type="range" id="capRange" min="10" max="50" value="30"/></label>
          </div>
        </div>
      </aside>
    </div>
  </div>
  <div id="tooltip" class="tooltip" role="status" aria-live="polite"></div>

  <script>
    const navTabs = ["Home", "Rooms", "Clusters", "Sim Lab", "Notifications", "Profile", "Ledger", "Settings"];
    const scenarios = [
      "Low-noise thoughtful room", "Medium-noise trending room", "High-noise overloaded room",
      "Coordination attack / brigading", "Healthy bridge-building", "Creator self-boost saturation"
    ];

    const state = {
      mode: sessionStorage.getItem("sooploopMode") || "user",
      nav: "Home",
      seed: Number(sessionStorage.getItem("sooploopSeed") || 42),
      tick: 0,
      isPlaying: false,
      speed: 1,
      scenario: scenarios[0],
      sliders: { noise: 40, overlap: 54, decay: 8, cap: 30 },
      user: {
        id: "u-1", handle: "@sofia", trustTier: "Builder", citationRate: 0.64,
        VC: 42.8, TR: 86, BT: 12.2, XP: 120, authorityWeight: 1.29, falseFlagRate: 0.05
      },
      rooms: [
        { id: "r1", name: "Ocean Lab", congestion: 0.38, messagesPerMinute: 42 },
        { id: "r2", name: "Mobility Desk", congestion: 0.64, messagesPerMinute: 89 },
        { id: "r3", name: "Culture Wire", congestion: 0.52, messagesPerMinute: 71 },
        { id: "r4", name: "City Life", congestion: 0.73, messagesPerMinute: 112 }
      ],
      clusters: [],
      posts: [],
      comments: [],
      ledger: [],
      onboarding: { done: false, step: 1 },
      selectedClusterId: null
    };

    function random(seed) {
      let t = seed + 0x6D2B79F5;
      return () => (t = Math.imul(t ^ t >>> 15, t | 1), t ^= t + Math.imul(t ^ t >>> 7, t | 61), ((t ^ t >>> 14) >>> 0) / 4294967296);
    }

    function seedData(seed) {
      const rnd = random(seed);
      const names = ["Ocean Microplastics", "Transit Fare Equity", "Museum AR Guides", "Harbor Heat Islands", "Bike Lane Sensors", "Repair Cafes", "Soundwalk Ethics", "Floodplain Housing", "Open Data Commons", "Studio Labor Rights"];
      state.clusters = names.map((label, i) => ({
        clusterId: `c-${i + 1}`,
        label,
        momentum: Math.round(36 + rnd() * 74),
        sentimentNorthSouth: (rnd() * 2 - 1).toFixed(2),
        sentimentEastWest: (rnd() * 2 - 1).toFixed(2),
        overlapUserCount: Math.floor(36 + rnd() * 220),
        overlapCitationCount: Math.floor(14 + rnd() * 85),
        overlapReferenceCount: Math.floor(10 + rnd() * 70),
        x: 7 + rnd() * 84,
        y: 10 + rnd() * 78
      }));

      const personaPosts = [
        { title: "How we measured neighborhood heat fairly", body: "Shared methods + source links so everyone can audit the conclusions.", citationCount: 5, helpfulScore: 82, bridgeValue: 71 },
        { title: "Transit survey summary for late-shift riders", body: "Collected rider stories and paired them with open schedule data.", citationCount: 4, helpfulScore: 76, bridgeValue: 69 },
        { title: "Repair cafes reduced waste this quarter", body: "Monthly notes with receipts, photos, and practical 'how-to' takeaways.", citationCount: 6, helpfulScore: 89, bridgeValue: 65 }
      ];

      state.posts = Array.from({ length: 50 }).map((_, i) => {
        const room = state.rooms[Math.floor(rnd() * state.rooms.length)];
        const cluster = state.clusters[Math.floor(rnd() * state.clusters.length)];
        const helpful = rnd();
        const cited = rnd();
        const bridge = rnd();
        const rank = 1 + rnd() * 4 + helpful * 2 + cited * 1.4 + bridge * 1.6;
        const personaSeed = personaPosts[i];
        return {
          postId: `p-${i + 1}`,
          authorId: i < personaPosts.length || i % 3 === 0 ? "u-1" : `u-${2 + (i % 8)}`,
          roomId: room.id,
          clusterId: cluster.clusterId,
          title: personaSeed?.title || `${cluster.label}: signal report #${i + 1}`,
          body: personaSeed?.body || "Synthesis with citations, fairness framing, and bridge potential.",
          citationCount: personaSeed?.citationCount ?? Math.floor(cited * 8),
          helpfulScore: personaSeed?.helpfulScore ?? Math.floor(helpful * 100),
          bridgeValue: personaSeed?.bridgeValue ?? Math.floor(bridge * 100),
          freshness: Number((100 - i * 0.9).toFixed(1)),
          boostSpend: Number((rnd() * 2.2).toFixed(2)),
          rankScore: Number((personaSeed ? rank + 0.9 : rank).toFixed(2)),
          noiseFlags: Number((rnd() * 0.8).toFixed(2)),
          upvotes: Math.floor(20 + rnd() * 80),
          downvotes: Math.floor(rnd() * 18)
        };
      });

      state.comments = Array.from({ length: 150 }).map((_, i) => ({
        commentId: `cm-${i + 1}`,
        postId: `p-${1 + Math.floor(rnd() * state.posts.length)}`,
        body: i < 5 ? "Follow-up with sources and a practical next step for newcomers." : "Bridge comment with citations and practical framing.",
        authorId: i < 5 || i % 5 === 0 ? "u-1" : `u-${2 + (i % 9)}`,
        upvotes: Math.floor(1 + rnd() * 22),
        trustImpact: Number((0.1 + rnd() * 0.7).toFixed(2))
      }));

      state.selectedClusterId = state.clusters[0].clusterId;
      state.ledger = [
        { type: "VC_REFUND", amount: 1.2, reason: "Helpful cited post", ts: Date.now() - 86400000 },
        { type: "TR_EARN", amount: 2.3, reason: "Helpful comments from previous week", ts: Date.now() - 7200000 }
      ];
      state.onboarding = { done: false, step: 1 };
    }

    const roomName = id => state.rooms.find(r => r.id === id)?.name || id;
    const clusterName = id => state.clusters.find(c => c.clusterId === id)?.label || id;
    const postById = id => state.posts.find(p => p.postId === id);
    const mainNav = document.getElementById("mainNav");
    const balances = document.getElementById("balances");
    const diagnostics = document.getElementById("diagnostics");
    const viewRoot = document.getElementById("viewRoot");
    const playPauseBtn = document.getElementById("playPauseBtn");
    const userModeBtn = document.getElementById("userModeBtn");
    const engineModeBtn = document.getElementById("engineModeBtn");
    const modeTitle = document.getElementById("mode-title");
    const modeSubtitle = document.getElementById("mode-subtitle");
    const commentsFor = postId => state.comments.filter(c => c.postId === postId);

    function calcAuthority() {
      state.user.authorityWeight = Number((1 + Math.log10(Math.max(state.user.TR, 1)) * 0.15).toFixed(2));
      if (state.user.XP > 320) state.user.trustTier = "Steward";
      else if (state.user.XP > 180) state.user.trustTier = "Connector";
      else state.user.trustTier = "Builder";
    }

    function costPreview(action, roomId) {
      const base = action === "post" ? 3 : 1;
      const room = state.rooms.find(r => r.id === roomId) || state.rooms[0];
      const congestionMultiplier = Number((1 + room.congestion * 1.8).toFixed(2));
      const driftMultiplier = Number((1 + state.user.falseFlagRate * 3 + state.sliders.noise / 100).toFixed(2));
      return { base, congestionMultiplier, driftMultiplier, total: Number((base * congestionMultiplier * driftMultiplier).toFixed(2)) };
    }

    function awardPoints(points, reason) {
      state.user.XP += points;
      state.ledger.push({ type: "XP", amount: points, reason, ts: Date.now() });
      calcAuthority();
    }

    function makeToast(text) {
      const node = document.createElement("div");
      node.className = "toast";
      node.textContent = text;
      document.body.appendChild(node);
      setTimeout(() => node.remove(), 2900);
    }

    function renderNav() {
      mainNav.innerHTML = navTabs.map(tab => `<button class="${state.nav === tab ? "active" : ""}" data-tab="${tab}" data-tip="Open ${tab} view">${tab}</button>`).join("");
      mainNav.querySelectorAll("button").forEach(btn => btn.onclick = () => { state.nav = btn.dataset.tab; render(); });
    }

    function renderBalances() {
      calcAuthority();
      balances.innerHTML = `
        <div class="pill" data-tip="Voice credits are spent when posting or commenting in busy rooms."><small>VC</small><b>${state.user.VC.toFixed(1)}</b><div class="muted">Spend to speak</div></div>
        <div class="pill" data-tip="Trust is earned from consistently useful contributions and helpful comments."><small>TR</small><b>${state.user.TR.toFixed(1)}</b><div class="muted">Earned trust</div></div>
        <div class="pill" data-tip="Boost credits expand reach, but self-boosting is capped."><small>BT</small><b>${state.user.BT.toFixed(1)}</b><div class="muted">Boost reach</div></div>
      `;
    }

    function renderDiagnostics() {
      const top = [...state.posts].sort((a, b) => b.rankScore - a.rankScore)[0];
      const cp = costPreview("post", top.roomId);
      diagnostics.innerHTML = `
        <div><b>Scenario:</b> ${state.scenario}</div>
        <div><b>Tick:</b> ${state.tick}</div>
        <div><b>Authority:</b> ${state.user.authorityWeight}x</div>
        <div><b>Top post rank:</b> ${top.rankScore.toFixed(2)}</div>
        <div><b>Post VC cost:</b> ${cp.total.toFixed(2)}</div>
        <div><b>Profile XP:</b> ${state.user.XP}</div>
        <div><b>Tier:</b> ${state.user.trustTier}</div>
        <hr style="border-color:var(--border);opacity:.4"/>
        <div><b>Algorithm factors:</b></div>
        <div>• helpfulness ${top.helpfulScore}</div>
        <div>• bridge value ${top.bridgeValue}</div>
        <div>• citations ${top.citationCount}</div>
        <div>• freshness ${top.freshness.toFixed(1)}</div>
      `;
    }

    function renderPostCard(p) {
      const comments = commentsFor(p.postId).slice(-4);
      return `
        <article class="feed-card">
          <div class="row"><span class="chip" data-tip="Current room where this conversation is active.">${roomName(p.roomId)}</span><span class="chip" data-tip="Cluster determines nearby related ideas and audiences.">${clusterName(p.clusterId)}</span><span class="chip" data-tip="Citations improve trust and ranking transparency.">citations ${p.citationCount}</span></div>
          <h4 style="margin-bottom:6px">${p.title}</h4>
          <div class="muted">${p.body}</div>
          <div class="row" style="margin-top:8px">
            <button class="btn" data-act="upvote" data-id="${p.postId}" data-tip="Signal this adds value. Helps rank and gives small XP.">▲ Upvote</button>
            <button class="btn bad" data-act="downvote" data-id="${p.postId}" data-tip="Reduce visibility of low-quality content.">▼ Downvote</button>
            <button class="btn" data-act="cite" data-id="${p.postId}" data-tip="Attach a source to increase trust weight.">Cite</button>
            <button class="btn" data-act="boost" data-id="${p.postId}" data-tip="Spend boost credits to broaden reach.">Boost</button>
            <button class="btn warn" data-act="sus" data-id="${p.postId}" data-tip="Stake trust when you suspect manipulation.">Flag Sus</button>
            <span class="muted">Score ${p.upvotes - p.downvotes} • Rank ${p.rankScore.toFixed(2)}</span>
          </div>

          <div class="comment-list">
            ${comments.map(c => `<div class="comment-item"><div>${c.body}</div><div class="muted">${c.authorId === "u-1" ? state.user.handle : "@participant"} · 👍 ${c.upvotes} · trust +${(c.trustImpact || 0.2).toFixed(2)}</div><div class="comment-actions"><button class="mini-btn" data-act="upvote-comment" data-id="${c.commentId}" data-tip="Appreciate a comment. Raises trust earned by that author.">👍 Helpful</button></div></div>`).join("") || `<div class="muted">No comments yet.</div>`}
          </div>
          <div class="row" style="margin-top:8px">
            <textarea class="comment-input" id="comment-${p.postId}" placeholder="Add a thoughtful comment..." data-tip="Thoughtful comments can earn trust over time."></textarea>
            <button class="btn good" data-act="comment" data-id="${p.postId}" data-tip="Post your comment and gain XP.">Comment +2 XP</button>
          </div>
          ${state.mode === "engine" ? `<div class="muted" style="margin-top:8px">freshness ${p.freshness} · bridge ${p.bridgeValue} · noise ${p.noiseFlags}</div>` : ""}
        </article>
      `;
    }

    function homeView() {
      const feed = [...state.posts].sort((a, b) => b.rankScore - a.rankScore).slice(0, 8);
      const onboarding = !state.onboarding.done ? `<div class="feed-card"><h3 style="margin:0 0 6px">Start here</h3><div class="muted">1) Read how ranking works. 2) Upvote a useful post. 3) Leave one sourced comment to begin earning trust.</div><button class="btn good" data-act="complete-onboarding" style="margin-top:8px" data-tip="Marks onboarding complete and grants a starter trust bonus.">Complete onboarding checklist</button></div>` : "";
      return `
        <div class="split">
          <section class="panel" style="padding:12px;background:var(--panel-soft)">
            <h2 style="margin-top:0">Home Feed</h2>
            <div class="muted">Transparent ranking: every action nudges placement in visible, explainable ways.</div>
            ${onboarding}
            ${feed.map(renderPostCard).join("")}
          </section>

          <section class="panel" style="padding:12px;background:var(--panel-soft)">
            <h3 style="margin-top:0">Composer</h3>
            <div class="composer"><textarea id="postBody" placeholder="Publish a synthesis with optional citation and bridge framing..." data-tip="New posts start in nearby clusters, then move based on trust signals."></textarea></div>
            <div class="row" style="margin-top:8px"><label data-tip="Sources reduce misinformation risk and improve trust return."><input id="citeCheck" type="checkbox"/> include citation</label><label data-tip="Bridge topics connect multiple clusters."><input id="bridgeCheck" type="checkbox"/> add bridge topic</label></div>
            <div id="costPreview" class="muted" style="margin-top:8px"></div>
            <div class="row" style="margin-top:8px"><button class="btn good" id="submitPostBtn" data-tip="Post publicly. Cost adapts to room congestion and noise.">Post (+5 XP)</button><span class="chip">refund window 2h</span></div>
            <h4>Recommended Bridges</h4>
            ${state.clusters.slice(0, 5).map(c => `<div class="row"><span>${c.label}</span><span class="muted">overlap ${c.overlapUserCount}</span></div>`).join("")}
          </section>
        </div>
      `;
    }

    function roomsView() {
      return `<h2>Topic Rooms</h2>${state.rooms.map(r => {
        const c = costPreview("comment", r.id);
        return `<div class="feed-card"><div class="row"><b>${r.name}</b><span class="chip">noise ${(r.congestion * 100).toFixed(0)}%</span><span class="chip">${r.messagesPerMinute} msg/min</span></div><div class="muted">Posting now costs ${c.total} VC. Add citation to improve refunds.</div><div class="meter"><div style="width:${Math.min(100, r.congestion * 100)}%"></div></div></div>`;
      }).join("")}`;
    }

    function clusterView() {
      const selected = state.clusters.find(c => c.clusterId === state.selectedClusterId) || state.clusters[0];
      return `<h2>Cluster Constellation</h2><div class="split"><div class="map" id="clusterMap" data-tip="Larger circles mean more momentum. Click any cluster to inspect ranking causes."></div><div class="feed-card"><h3>${selected.label}</h3><div class="muted">activity ${selected.momentum} • overlap users ${selected.overlapUserCount}</div><div class="muted">sentiment NS ${selected.sentimentNorthSouth}, EW ${selected.sentimentEastWest}</div><h4>Top bridging post</h4><div class="muted">${state.posts.find(p => p.clusterId === selected.clusterId)?.title || "None"}</div><h4>Why this cluster rises</h4><ul class="muted"><li>shared participants</li><li>shared citations</li><li>explicit references</li><li>semantic proximity</li></ul><div class="muted">Ranking is transparent: these same factors appear in diagnostics.</div></div></div>`;
    }

    function simLabView() {
      return `<h2>Simulation Lab</h2><div class="feed-card"><div class="row"><span class="chip">tick ${state.tick}</span><span class="chip">scenario ${state.scenario}</span></div><p>Run seeded scenarios for brigading, saturation, and bridge-building. Every vote/comment/citation visibly changes trust and rank in real time.</p><div class="muted">Tip: hover controls to learn what each lever does.</div></div>`;
    }

    function profileView() {
      return `<h2>Profile</h2><div class="feed-card"><div><b>${state.user.handle}</b> · Tier ${state.user.trustTier}</div><div class="muted">Citation rate ${(state.user.citationRate * 100).toFixed(0)}% · false flag ${(state.user.falseFlagRate * 100).toFixed(1)}%</div><h3 style="margin-bottom:4px">${state.user.XP} XP</h3><div class="meter"><div style="width:${Math.min(100, (state.user.XP % 200) / 2)}%"></div></div><div class="muted">Next tier goal: 400 XP</div></div><div class="feed-card"><h4 style="margin:0 0 6px">Your earning history</h4>${state.posts.filter(p => p.authorId === "u-1").slice(0,3).map(p => `<div class="row"><span>${p.title}</span><span class="muted">+TR ${(p.helpfulScore/120).toFixed(2)}</span></div>`).join("")}<div class="muted" style="margin-top:8px">Explore older posts/comments to see exactly how trust was earned.</div></div>`;
    }

    function ledgerView() {
      return `<h2>Trust Ledger</h2>${state.ledger.slice(-12).reverse().map(e => `<div class="feed-card"><div class="row"><span class="chip">${e.type}</span><span>${e.amount > 0 ? "+" : ""}${e.amount.toFixed(2)}</span></div><div class="muted">${e.reason}</div></div>`).join("")}`;
    }

    function simpleView(title, copy) { return `<h2>${title}</h2><div class="feed-card"><p>${copy}</p></div>`; }

    function renderMain() {
      if (state.nav === "Home") viewRoot.innerHTML = homeView();
      else if (state.nav === "Rooms") viewRoot.innerHTML = roomsView();
      else if (state.nav === "Clusters") viewRoot.innerHTML = clusterView();
      else if (state.nav === "Sim Lab") viewRoot.innerHTML = simLabView();
      else if (state.nav === "Ledger") viewRoot.innerHTML = ledgerView();
      else if (state.nav === "Profile") viewRoot.innerHTML = profileView();
      else if (state.nav === "Notifications") viewRoot.innerHTML = simpleView("Notifications", "Trust deltas, refunds, and anti-abuse notices appear here.");
      else viewRoot.innerHTML = simpleView("Settings", "Motion reduction, simulation defaults, and display preferences.");

      bindDynamicActions();
      if (state.nav === "Clusters") paintMap();
      if (state.nav === "Home") showComposerCost();
    }

    function bindDynamicActions() {
      document.querySelectorAll("[data-act='boost']").forEach(btn => btn.onclick = () => spendBoost(btn.dataset.id));
      document.querySelectorAll("[data-act='sus']").forEach(btn => btn.onclick = () => susVote(btn.dataset.id));
      document.querySelectorAll("[data-act='cite']").forEach(btn => btn.onclick = () => addCitation(btn.dataset.id));
      document.querySelectorAll("[data-act='upvote']").forEach(btn => btn.onclick = () => vote(btn.dataset.id, 1));
      document.querySelectorAll("[data-act='downvote']").forEach(btn => btn.onclick = () => vote(btn.dataset.id, -1));
      document.querySelectorAll("[data-act='comment']").forEach(btn => btn.onclick = () => addComment(btn.dataset.id));
      document.querySelectorAll("[data-act='upvote-comment']").forEach(btn => btn.onclick = () => upvoteComment(btn.dataset.id));
      document.querySelectorAll("[data-act='complete-onboarding']").forEach(btn => btn.onclick = completeOnboarding);

      const postBtn = document.getElementById("submitPostBtn");
      if (postBtn) postBtn.onclick = submitPost;
      const citeCheck = document.getElementById("citeCheck");
      const bridgeCheck = document.getElementById("bridgeCheck");
      if (citeCheck) citeCheck.onchange = showComposerCost;
      if (bridgeCheck) bridgeCheck.onchange = showComposerCost;
      bindTooltips();
    }


    function completeOnboarding() {
      if (state.onboarding.done) return;
      state.onboarding.done = true;
      state.user.TR += 1.5;
      awardPoints(8, "Completed onboarding");
      state.ledger.push({ type: "TR_EARN", amount: 1.5, reason: "Completed onboarding", ts: Date.now() });
      makeToast("Onboarding complete. You now understand ranking controls.");
      render();
    }

    function upvoteComment(commentId) {
      const comment = state.comments.find(c => c.commentId === commentId);
      if (!comment) return;
      comment.upvotes += 1;
      const trustGain = Number((0.06 + (comment.upvotes / 180)).toFixed(2));
      comment.trustImpact = Number(((comment.trustImpact || 0.2) + 0.04).toFixed(2));
      if (comment.authorId === "u-1") {
        state.user.TR = Number((state.user.TR + trustGain).toFixed(2));
        state.ledger.push({ type: "TR_EARN", amount: trustGain, reason: "Comment upvote received", ts: Date.now() });
      }
      makeToast("Comment upvote recorded and trust recalculated.");
      render();
    }

    function bindTooltips() {
      const tooltip = document.getElementById("tooltip");
      if (!tooltip) return;
      const targets = document.querySelectorAll("[data-tip]");
      targets.forEach(el => {
        el.onmousemove = e => {
          tooltip.textContent = el.dataset.tip;
          tooltip.style.left = `${Math.min(window.innerWidth - 270, e.clientX + 14)}px`;
          tooltip.style.top = `${Math.min(window.innerHeight - 70, e.clientY + 14)}px`;
          tooltip.classList.add("show");
        };
        el.onmouseleave = () => tooltip.classList.remove("show");
      });
    }

    function showComposerCost() {
      const cp = costPreview("post", state.rooms[0].id);
      const cited = document.getElementById("citeCheck")?.checked;
      const bridge = document.getElementById("bridgeCheck")?.checked;
      const discount = (cited ? 0.15 : 0) + (bridge ? 0.1 : 0);
      const final = Math.max(0.5, cp.total * (1 - discount));
      const costNode = document.getElementById("costPreview");
      if (costNode) costNode.innerHTML = `VC preview: ${final.toFixed(2)} = base ${cp.base} × congestion ${cp.congestionMultiplier} × drift ${cp.driftMultiplier}${discount ? ` (discount ${Math.round(discount * 100)}%)` : ""}`;
    }

    function submitPost() {
      const text = document.getElementById("postBody")?.value.trim();
      if (!text) return makeToast("Add text before posting.");
      const cp = costPreview("post", state.rooms[0].id);
      if (state.user.VC < cp.total) return makeToast("Insufficient VC.");
      state.user.VC -= cp.total;
      state.posts.unshift({
        postId: `p-${state.posts.length + 1}`,
        authorId: "u-1",
        roomId: "r1",
        clusterId: state.selectedClusterId,
        title: "New local synthesis",
        body: text,
        citationCount: 0,
        helpfulScore: 0,
        bridgeValue: 0,
        freshness: 100,
        boostSpend: 0,
        rankScore: 2.2,
        noiseFlags: 0.1,
        upvotes: 1,
        downvotes: 0
      });
      state.ledger.push({ type: "VC_SPEND", amount: -cp.total, reason: "Create post", ts: Date.now() });
      awardPoints(5, "Published post");
      makeToast(`Post submitted. +5 XP, spent ${cp.total.toFixed(2)} VC.`);
      render();
    }

    function addComment(postId) {
      const input = document.getElementById(`comment-${postId}`);
      const text = input?.value.trim();
      if (!text) return makeToast("Write a comment first.");
      const spend = 0.9;
      if (state.user.VC < spend) return makeToast("Not enough VC to comment.");
      state.user.VC -= spend;
      state.comments.push({ commentId: `cm-${state.comments.length + 1}`, postId, body: text, authorId: "u-1", upvotes: 0, trustImpact: 0.22 });
      state.ledger.push({ type: "VC_SPEND", amount: -spend, reason: "Add comment", ts: Date.now() });
      awardPoints(2, "Added comment");
      makeToast("Comment posted. +2 XP.");
      renderMain();
      renderBalances();
      renderDiagnostics();
    }

    function vote(postId, direction) {
      const post = postById(postId);
      if (!post) return;
      if (direction > 0) {
        post.upvotes += 1;
        post.rankScore = Number((post.rankScore + 0.08).toFixed(2));
        awardPoints(1, "Upvoted a post");
        makeToast("Upvoted. +1 XP.");
      } else {
        post.downvotes += 1;
        post.rankScore = Number(Math.max(0.3, post.rankScore - 0.06).toFixed(2));
        makeToast("Downvoted.");
      }
      renderMain();
      renderDiagnostics();
    }

    function addCitation(postId) {
      const post = postById(postId);
      if (!post) return;
      post.citationCount += 1;
      post.rankScore = Number((post.rankScore + 0.12).toFixed(2));
      state.user.TR += 0.2;
      awardPoints(2, "Added citation");
      makeToast("Citation added. +2 XP and +TR.");
      render();
    }

    function spendBoost(postId) {
      const post = postById(postId);
      const self = post.authorId === "u-1";
      const cap = (state.sliders.cap / 100) * (Math.sqrt(state.user.TR) * 1.2);
      const spend = self ? 1.2 : 0.8;
      if (self && spend > cap) return makeToast("Self-boost cap reached.");
      if (state.user.BT < spend) return makeToast("Not enough BT.");
      state.user.BT -= spend;
      post.boostSpend += spend;
      post.rankScore += self ? 0.35 : 0.5;
      state.ledger.push({ type: "BT_SPEND", amount: -spend, reason: `Boost ${self ? "self" : "other"} content`, ts: Date.now() });
      awardPoints(self ? 1 : 2, self ? "Boosted own post" : "Boosted peer post");
      makeToast(`Boosted ${self ? "self" : "other"} content.`);
      render();
    }

    function susVote(postId) {
      const post = postById(postId);
      if (!post) return;
      const cost = 1.1;
      if (state.user.TR < cost) return makeToast("Not enough TR to stake a Sus vote.");
      state.user.TR -= cost;
      const accurate = Math.random() > 0.35;
      const delta = accurate ? 0.8 : -1.2;
      state.user.TR += Math.max(-state.user.TR, delta);
      if (accurate) {
        post.rankScore = Number(Math.max(0.2, post.rankScore - 0.2).toFixed(2));
        awardPoints(3, "Accurate Sus vote");
      }
      state.user.falseFlagRate = Math.max(0, Math.min(0.6, state.user.falseFlagRate + (accurate ? -0.01 : 0.02)));
      state.ledger.push({ type: "TR_EARN", amount: delta, reason: accurate ? "Accurate Sus vote" : "False Sus penalty", ts: Date.now() });
      makeToast(accurate ? "Sus vote validated. +3 XP." : "Sus vote inaccurate.");
      render();
    }

    function paintMap() {
      const map = document.getElementById("clusterMap");
      if (!map) return;
      map.innerHTML = "";
      state.clusters.forEach(c => {
        const node = document.createElement("button");
        const size = 28 + c.momentum * 0.45;
        const hue = 180 + Number(c.sentimentEastWest) * 80;
        node.className = "node";
        node.style.left = `${c.x}%`;
        node.style.top = `${c.y}%`;
        node.style.width = `${size}px`;
        node.style.height = `${size}px`;
        node.style.background = `hsl(${hue} 85% 70%)`;
        node.innerHTML = `<span class="node-label">${c.label.split(" ").slice(0,2).join(" ")}</span>`;
        node.dataset.tip = `${c.label} — momentum ${c.momentum}, overlap ${c.overlapUserCount}. Click to inspect why this cluster ranks where it does.`;
        node.onclick = () => { state.selectedClusterId = c.clusterId; renderMain(); };
        map.appendChild(node);
      });
    }

    function tick() {
      state.tick += 1;
      const noiseDelta = (state.sliders.noise / 1000) * (state.scenario.includes("High-noise") ? 2 : 1);
      state.rooms.forEach(r => r.congestion = Math.min(1, Math.max(0.1, r.congestion + (Math.random() - 0.45) * noiseDelta)));
      state.posts.forEach(p => {
        p.freshness = Math.max(1, p.freshness - 0.3);
        p.rankScore = Number((p.rankScore + (Math.random() - 0.5) * 0.16).toFixed(2));
      });
      state.comments.forEach(c => {
        if (Math.random() < 0.08) {
          c.upvotes += 1;
          c.trustImpact = Number(((c.trustImpact || 0.2) + 0.03).toFixed(2));
          if (c.authorId === "u-1") state.user.TR = Number((state.user.TR + 0.03).toFixed(2));
        }
      });
      state.user.TR = Math.max(1, Number((state.user.TR * (1 - state.sliders.decay / 10000)).toFixed(2)));
      const trustDividend = Number((Math.sqrt(state.user.TR) * 0.03).toFixed(2));
      state.user.BT += trustDividend;
      state.ledger.push({ type: "BT_EARN", amount: trustDividend, reason: "Trust dividend from consistent quality", ts: Date.now() });
      render();
    }

    let timer = null;
    function togglePlay() {
      state.isPlaying = !state.isPlaying;
      playPauseBtn.textContent = state.isPlaying ? "Pause" : "Play";
      if (state.isPlaying) timer = setInterval(() => { for (let i = 0; i < state.speed; i++) tick(); }, 1000);
      else clearInterval(timer);
    }

    function setMode(mode) {
      state.mode = mode;
      sessionStorage.setItem("sooploopMode", mode);
      document.body.dataset.mode = mode;
      userModeBtn.classList.toggle("active", mode === "user");
      engineModeBtn.classList.toggle("active", mode === "engine");
      modeTitle.textContent = mode === "user" ? "User View" : "Engine View";
      modeSubtitle.textContent = mode === "user" ? "See the platform the way participants do." : "Inspect ranking, reputation, and anti-abuse internals.";
      render();
    }

    function render() {
      renderNav();
      renderBalances();
      renderDiagnostics();
      renderMain();
    }

    seedData(state.seed);
    document.getElementById("seedInput").value = state.seed;
    document.getElementById("scenarioSelect").innerHTML = scenarios.map(s => `<option>${s}</option>`).join("");
    document.getElementById("scenarioSelect").onchange = e => { state.scenario = e.target.value; renderDiagnostics(); };
    document.getElementById("speedRange").oninput = e => state.speed = Number(e.target.value);
    document.getElementById("noiseRange").oninput = e => state.sliders.noise = Number(e.target.value);
    document.getElementById("overlapRange").oninput = e => state.sliders.overlap = Number(e.target.value);
    document.getElementById("decayRange").oninput = e => state.sliders.decay = Number(e.target.value);
    document.getElementById("capRange").oninput = e => state.sliders.cap = Number(e.target.value);
    document.getElementById("playPauseBtn").onclick = togglePlay;
    document.getElementById("stepBtn").onclick = tick;
    document.getElementById("resetSimBtn").onclick = () => { seedData(state.seed); state.tick = 0; makeToast("Simulation reset to seeded baseline."); render(); };
    document.getElementById("seedInput").onchange = e => { state.seed = Number(e.target.value || 42); sessionStorage.setItem("sooploopSeed", String(state.seed)); seedData(state.seed); render(); };
    document.getElementById("userModeBtn").onclick = () => setMode("user");
    document.getElementById("engineModeBtn").onclick = () => setMode("engine");
    setMode(state.mode);
  </script>
</body>
</html>
